{% extends "base.html" %}

{% block content %}
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-32">
    <div class="max-w-2xl w-full animate-reveal opacity-0 relative z-10">
        <div class="relative bg-white rounded-lg shadow-xl overflow-hidden">
            <div class="h-2 w-full bg-gradient-to-r from-primary to-primary-container"></div>
            
            <div class="p-8 md:p-12 flex flex-col items-center text-center">
                <h1 class="font-headline text-4xl md:text-5xl font-extrabold text-primary mb-6">
                    Hello Oprah ?
                </h1>
                
                <div class="space-y-6 text-on-surface-variant text-lg font-light mb-6">
                    <p>
                       I’ve been wanting to ask you something simple but important—
                        will you be my girlfriend?
                    </p>
                </div>

                <div id="button-container" class="flex justify-center gap-4 my-4">
                    <button id="btn-yes" class="px-8 py-3 bg-[#a33759] text-white font-bold rounded-full hover:bg-[#841e41] hover:scale-110 transition-all shadow-md">
                        Yes, I will!
                    </button>
                    <button id="btn-no" class="px-8 py-3 bg-gray-200 text-gray-500 font-bold rounded-full hover:bg-gray-300 transition-all">
                        No
                    </button>
                </div>

                <div id="success-message" class="hidden my-4 space-y-2">
                    <p class="font-bold text-2xl text-[#a33759] animate-pulse">She said YES! 🎉</p>
                    <p class="text-sm text-gray-500">Calling Wayne to confirm... 😂</p>
                </div>
                
                <div class="mt-8 w-full relative h-96 rounded-lg overflow-hidden group">
                    <img src="{{ url_for('static', filename='img/IMG_6637.JPEG') }}" alt="Oprah" class="w-full h-full object-scale-down transform transition-transform duration-700 group-hover:scale-110" />
                </div>
                
                <div class="mt-12 pt-8 border-t border-gray-200 w-full">
                    <p class="font-headline italic text-2xl text-secondary">
                        Forever Yours, Wayne Kiprotich
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>
<footer class="bg-primary-fixed-dim/90 backdrop-blur-xl text-on-surface-variant text-lg font-light text-center py-4 px-8 fixed bottom-0 left-0 w-full z-50">
  <p class="text-sm">
    I Love You, Oprah! 💖
  </p>
</footer>

<script>
    // Handle the "No" Button
    document.getElementById('btn-no').addEventListener('click', function(e) {
        e.preventDefault(); // Stops the button from doing anything else
        alert("Nice try, Oprah! But that will never work. 😂 You have to click the other button!");
    });

    // Handle the "Yes" Button
    document.getElementById('btn-yes').addEventListener('click', function() {
        // 1. Release the emojis! (Finds the container in base.html and shows it)
        const emojiContainer = document.querySelector('.emoji-container');
        if (emojiContainer) {
            emojiContainer.style.display = 'block';
        }

        // 2. Hide the buttons and show the success message
        document.getElementById('button-container').style.display = 'none';
        document.getElementById('success-message').classList.remove('hidden');

        // 3. Wait 2 seconds so she sees the emojis, then automatically trigger the phone call!
        setTimeout(() => {
            window.location.href = "tel:+254726870636";
        }, 2000);
    });
</script>
{% endblock %}
